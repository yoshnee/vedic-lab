<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- The app logo: the North Indian chart-diamond mark (Celestial.diamond, glow
       variant) on the dark app canvas, so it reads as the brand on any tab bar.
       Mirrors src/celestial/celestial.ts diamond() — keep them in sync. -->
  <defs>
    <radialGradient id="jlg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6D8"/>
      <stop offset="42%" stop-color="#F3C85A"/>
      <stop offset="100%" stop-color="#F3C85A" stop-opacity="0"/>
    </radialGradient>
    <filter id="jlb" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="3.4"/>
    </filter>
  </defs>
  <rect width="100" height="100" rx="18" fill="#0C1C15"/>
  <g fill="none" stroke="#E4C257" stroke-linejoin="round" stroke-linecap="round">
    <rect x="9" y="9" width="82" height="82" rx="7" stroke-width="4.4"/>
    <path d="M9 9 L91 91 M91 9 L9 91" stroke-width="2.3" stroke-opacity="0.78"/>
    <path d="M50 9 L91 50 L50 91 L9 50 Z" stroke-width="3.5"/>
  </g>
  <circle cx="50" cy="50" r="23" fill="url(#jlg)" filter="url(#jlb)"/>
  <path d="M50 38 L52.6 47.4 L62 50 L52.6 52.6 L50 62 L47.4 52.6 L38 50 L47.4 47.4 Z" fill="#FFF3CE"/>
  <circle cx="50" cy="50" r="3.4" fill="#FFFBEF"/>
</svg>
