<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Significations Cloud — Component</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .sigdemo{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:26px; padding:40px 20px; text-align:center;}
  .sigdemo-kicker{margin:0; font-family:var(--font-mono),monospace; font-size:11px; letter-spacing:.24em;
    text-transform:uppercase; color:var(--accent);}
  .sigdemo h1{font-size:clamp(26px,4vw,36px); letter-spacing:-.02em; margin:8px 0 10px;}
  .sigdemo-sub{margin:0; color:var(--text-2); font-size:14.5px; max-width:46ch;}
  .sigdemo-stack{width:340px; height:468px;}
  .sigdemo-foot{margin:0; font-family:var(--font-mono),monospace; font-size:11.5px; color:var(--text-3); letter-spacing:.04em;}
  .sigdemo-foot a{color:var(--accent); text-decoration:none; border-bottom:1px solid color-mix(in srgb,var(--accent) 45%, transparent);}
  .sigdemo-foot a:hover{border-bottom-color:var(--accent);}
  @media (max-width:420px){ .sigdemo-stack{width:86vw; height:62vh;} }
</style>
</head>
<body>
<div id="cloud-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="celestial.js"></script>
<script src="decks.data.js"></script>
<script type="text/babel" src="significations.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const { useState } = React;

function CloudDemo() {
  const deck = window.DECKS[0];
  const card = deck.cards.find(function (c) { return c.cloud; });
  const [flipped, setFlipped] = useState(true);
  const toggle = function () { setFlipped(function (f) { return !f; }); };
  return (
    <main className="sigdemo" data-screen-label="Significations Cloud demo">
      <header>
        <p className="sigdemo-kicker">Component · Houses deck</p>
        <h1>Significations Cloud</h1>
        <p className="sigdemo-sub">Weighted word-cloud back face for house flashcards — first instance, the 4th house. Click the card to flip.</p>
      </header>
      <div className="fc-stack sigdemo-stack">
        <div
          className="fc-cardbtn"
          role="button"
          tabIndex={0}
          aria-pressed={flipped}
          aria-label={card.title + '. ' + (flipped ? 'Showing significations cloud.' : 'Showing term.') + ' Activate to flip.'}
          onClick={toggle}
          onKeyDown={function (e) { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } }}
        >
          {React.createElement(window.FCCard, { card: card, deckAccent: deck.accent, flipped: flipped })}
        </div>
      </div>
      <p className="sigdemo-foot">Live in the deck: <a href="Flashcards.html">Flashcards → The Twelve Houses → card 04</a></p>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('cloud-root')).render(<CloudDemo />);
</script>
</body>
</html>
